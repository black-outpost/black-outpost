<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Black Outpost</title>
    <script>
      // SPA redirect: send all 404s back to index.html with the path encoded
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
